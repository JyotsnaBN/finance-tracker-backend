name: Trigger Email Processing (Prod)

on:
  schedule:
    - cron: "0,30 * * * *"
  workflow_dispatch:

jobs:
  trigger-email-processing-prod:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger prod backend email processing
        run: |
          curl --fail --show-error --silent \
            -X POST "${{ secrets.PROD_BACKEND_BASE_URL }}/api/internal/email-processing" \
            -H "X-API-KEY: ${{ secrets.PROD_INTERNAL_API_KEY }}" \
            -H "Content-Type: application/json"

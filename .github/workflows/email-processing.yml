name: Trigger Email Processing

on:
  schedule:
    - cron: "5,35 * * * *"
  workflow_dispatch:

jobs:
  trigger-email-processing:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger backend email processing API
        run: |
          curl --fail --show-error --silent \
            -X POST "${{ secrets.BACKEND_BASE_URL }}/api/internal/email-processing" \
            -H "X-API-KEY: ${{ secrets.INTERNAL_API_KEY }}" \
            -H "Content-Type: application/json"

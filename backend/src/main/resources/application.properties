spring.application.name=backend

spring.datasource.url=jdbc:postgresql://aws-1-ap-south-1.pooler.supabase.com:5432/postgres
spring.datasource.username=postgres.pypnurpfjbwvenwtmonm
spring.datasource.password=${SUPABASE_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.auto-commit=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

server.port=8080

google.oauth.client-id=${GOOGLE_CLIENT_ID}
google.oauth.client-secret=${GOOGLE_CLIENT_SECRET}
google.oauth.redirect-uri=${GOOGLE_REDIRECT_URI:http://localhost:8080/api/email/oauth/callback}
google.oauth.scopes=https://www.googleapis.com/auth/gmail.readonly https://www.googleapis.com/auth/userinfo.email

encryption.secret.key=${ENCRYPTION_SECRET_KEY}

email.sync.frequency-ms=${EMAIL_SYNC_FREQUENCY_MS:3600000}
email.sync.max-results=${EMAIL_SYNC_MAX_RESULTS:100}
email.sync.lookback-days=${EMAIL_SYNC_LOOKBACK_DAYS:30}

logging.level.com.financetracker=INFO
logging.level.com.financetracker.service.EmailReaderService=DEBUG
logging.level.org.springframework.security=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

jwt.secret=your-256-bit-secret-key-change-this-in-production-minimum-32-characters-required
jwt.expiration=86400000

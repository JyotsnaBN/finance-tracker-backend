# Production profile — activated via SPRING_PROFILES_ACTIVE=prod on Render.
# All secrets are injected as Render environment variables (sync: false).

# Schema validation only — never auto-alter the production database.
spring.jpa.hibernate.ddl-auto=validate

# Supabase free tier: max 5 direct connections.
spring.datasource.hikari.maximum-pool-size=5

# Logging — reduce noise in production; keep financetracker package at INFO.
logging.level.root=WARN
logging.level.com.financetracker=INFO
logging.level.org.springframework.security=WARN

# Google OAuth redirect URI — must be set explicitly in Render; no localhost default.
google.oauth.redirect-uri=${GOOGLE_REDIRECT_URI}

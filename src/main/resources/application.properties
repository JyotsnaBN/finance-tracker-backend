spring.application.name=backend

# Serialize java.time types as ISO-8601 strings (e.g. "2026-07-14T10:25:02Z")
# rather than numeric timestamps. In Jackson 3 / Spring Boot 4, date format is
# controlled via JavaTimeModule — WRITE_DATES_AS_TIMESTAMPS no longer exists as
# a SerializationFeature. Spring Boot auto-registers JavaTimeModule; ISO-8601
# output is its default when no explicit date format is set.
spring.jackson.deserialization.FAIL_ON_UNKNOWN_PROPERTIES=false

spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/financetracker}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.auto-commit=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

server.port=${PORT:8080}

google.oauth.client-id=${GOOGLE_CLIENT_ID}
google.oauth.client-secret=${GOOGLE_CLIENT_SECRET}
google.oauth.redirect-uri=${GOOGLE_REDIRECT_URI:http://localhost:8080/api/email/oauth/callback}
google.oauth.scopes=https://www.googleapis.com/auth/gmail.readonly https://www.googleapis.com/auth/userinfo.email

encryption.secret.key=${ENCRYPTION_SECRET_KEY}

email.sync.max-results=${EMAIL_SYNC_MAX_RESULTS:100}
email.sync.lookback-days=${EMAIL_SYNC_LOOKBACK_DAYS:30}

logging.level.com.financetracker=INFO
logging.level.com.financetracker.service.EmailReaderService=INFO
logging.level.org.springframework.security=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

jwt.secret=${JWT_SECRET}
# Access-token lifetime: 15 minutes (900 000 ms)
jwt.expiration=900000
# Refresh-token lifetime: 7 days (604 800 000 ms)
jwt.refresh-expiration=604800000

internal.api.key=${INTERNAL_API_KEY}

# Set to true once to encrypt any plain-text account numbers already in the DB.
# Controlled via env var so it never needs a code change to toggle.
migration.account-number.enabled=${MIGRATION_ACCOUNT_NUMBER_ENABLED:false}
